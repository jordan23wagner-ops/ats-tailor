<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ATS Resume Tailor</title></head><body style="background:#0d0f0e;color:#e8ebe9;font-family:sans-serif;max-width:900px;margin:0 auto;padding:2rem"><h1 style="color:#a3e635">ATS<span style="color:#e8ebe9">.</span>Tailor</h1><p style="color:#7a8078">Paste your resume and job description to get your ATS score instantly.</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:2rem 0"><div><label style="font-size:.75rem;color:#7a8078;text-transform:uppercase;letter-spacing:.1em">Your Resume</label><textarea id="resumeInput" style="width:100%;height:280px;background:#141716;border:1px solid #252926;color:#e8ebe9;padding:.75rem;font-size:.85rem;margin-top:.5rem" placeholder="Paste resume here..."></textarea></div><div><label style="font-size:.75rem;color:#7a8078;text-transform:uppercase;letter-spacing:.1em">Job Description</label><textarea id="jdInput" style="width:100%;height:280px;background:#141716;border:1px solid #252926;color:#e8ebe9;padding:.75rem;font-size:.85rem;margin-top:.5rem" placeholder="Paste job description here..."></textarea></div></div><button id="btn" onclick="analyze()" style="background:#a3e635;color:#0d0f0e;border:none;padding:.75rem 2rem;font-size:.9rem;font-weight:600;cursor:pointer;border-radius:3px">Analyze My Resume →</button><div id="out" style="margin-top:2rem"></div><script>async function analyze(){const resume=document.getElementById("resumeInput").value.trim();const jd=document.getElementById("jdInput").value.trim();if(!resume||!jd){alert("Please paste both fields.");return;}document.getElementById("btn").disabled=true;document.getElementById("out").innerHTML="<p style=color:#7a8078>Analyzing...</p>";try{const r=await fetch("https://y-delta-lake.vercel.app/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({resume,jobDescription:jd})});const d=await r.json();document.getElementById("out").innerHTML="<h2 style=color:#a3e635>Score: "+d.atsBefore+" → "+d.atsAfter+"</h2><p>"+d.summary+"</p><h3>Missing Keywords</h3><p>"+(d.missingKeywords||[]).join(", ")+"</p>";}catch(e){document.getElementById("out").innerHTML="<p style=color:#f87171>Error: "+e.message+"</p>";}document.getElementById("btn").disabled=false;}</script></body></html>
