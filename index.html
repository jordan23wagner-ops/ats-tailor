<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>FlagCheck - ATS Resume Analyzer</title></head><body style="background:#08080f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:900px;margin:0 auto;padding:2rem"><h1 style="color:#ffd60a">&#9873; FlagCheck</h1><p style="color:#7a8078">Paste your resume and job description to get your ATS score instantly.</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:2rem 0"><div><label style="font-size:.75rem;color:#7a8078;text-transform:uppercase;letter-spacing:.1em">Your Resume</label><textarea id="resumeInput" style="width:100%;height:280px;background:#141716;border:1px solid #252926;color:#e8e8f0;padding:.75rem;font-size:.85rem;margin-top:.5rem;border-radius:4px" placeholder="Paste resume here..."></textarea></div><div><label style="font-size:.75rem;color:#7a8078;text-transform:uppercase;letter-spacing:.1em">Job Description</label><textarea id="jdInput" style="width:100%;height:280px;background:#141716;border:1px solid #252926;color:#e8e8f0;padding:.75rem;font-size:.85rem;margin-top:.5rem;border-radius:4px" placeholder="Paste job description here..."></textarea></div></div><button id="btn" onclick="analyze()" style="background:#ffd60a;color:#08080f;border:none;padding:.75rem 2rem;font-size:.9rem;font-weight:700;cursor:pointer;border-radius:4px">Analyze My Resume &rarr;</button><div id="out" style="margin-top:2rem"></div><script>async function analyze(){const resume=document.getElementById("resumeInput").value.trim();const jd=document.getElementById("jdInput").value.trim();if(!resume||!jd){alert("Please paste both fields.");return;}const btn=document.getElementById("btn");btn.disabled=true;document.getElementById("out").innerHTML="<p style='color:#7a8078'>Analyzing...</p>";try{const r=await fetch("https://y-delta-lake.vercel.app/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({resume,jobDescription:jd})});const d=await r.json();if(d.error){document.getElementById("out").innerHTML="<p style='color:#f87171'>Error: "+d.error+"</p>";return;}document.getElementById("out").innerHTML="<h2 style='color:#ffd60a'>ATS Score: "+d.data.ats_score_before+" &rarr; "+d.data.ats_score_after+"</h2><p style='color:#c0c0d0'>"+d.data.summary_recommendation+"</p><h3 style='color:#ffd60a;margin-top:1rem'>Missing Keywords</h3><p style='color:#c0c0d0'>"+(d.data.missing_keywords||[]).join(", ")+"</p><h3 style='color:#ffd60a;margin-top:1rem'>Red Flags</h3><ul>"+(d.data.red_flags||[]).map(f=>"<li style='color:#f87171'>"+f+"</li>").join("")+"</ul>";}catch(e){document.getElementById("out").innerHTML="<p style='color:#f87171'>Error: "+e.message+"</p>";}btn.disabled=false;}</script></body></html>
